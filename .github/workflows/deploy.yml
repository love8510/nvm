name: Deploy to Vercel

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_YCjHtGIOJbfpw0nT92iENGcs
          VERCEL_PROJECT_ID: prj_jI9CvsnilCz9Duxi2I9U4UcJx5hg
