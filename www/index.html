<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>낙상예방 위험도 추적</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="./styles/main.css">
  <!-- GIS: onload 시 모듈에 알림 -->
  <script>window._gisCallbacks = [];</script>
  <script src="https://accounts.google.com/gsi/client" async defer
    onload="window._gisLoaded=true; window._gisCallbacks.forEach(f=>f()); window._gisCallbacks=[];"></script>
</head>
<body>

  <div class="glow glow-purple" aria-hidden="true"></div>
  <div class="glow glow-cyan"   aria-hidden="true"></div>

  <!-- ══════════════════════════════════════════════════════════
       LOGIN VIEW
       세션 없을 때 표시
  ══════════════════════════════════════════════════════════ -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo" aria-hidden="true">🌿</div>
      <h1 class="login-title">낙상예방 위험도 추적</h1>
      <p class="login-sub">재가 노인의 안전한 걸음을 데이터로 지킵니다</p>

      <!-- GIS renderButton 컨테이너 -->
      <div id="gsi-btn-container" style="display:flex;justify-content:center;margin-top:32px;min-height:44px;"></div>
      <p id="login-error" style="display:none;margin-top:12px;color:#f87171;font-size:0.82rem;text-align:center;"></p>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       MAIN VIEW
       세션 있을 때 표시
  ══════════════════════════════════════════════════════════ -->
  <div id="main-view" hidden>

    <!-- ── 헤더 ──────────────────────────────────────────── -->
    <header class="site-header">
      <div class="header-inner">

        <!-- 로고 -->
        <a href="./index.html" class="site-logo">
          <span aria-hidden="true">🌿</span>
          <span>낙상예방</span>
        </a>

        <!-- 중앙 내비게이션 -->
        <nav id="nav-menu" class="nav-menu" aria-label="주요 메뉴">
          <a href="./assessment.html">평가하기</a>
          <a href="./dashboard.html">대시보드</a>
          <a href="./education.html">교육자료</a>
          <a href="./reports.html">보고서</a>
        </nav>

        <!-- 우측: 프로필 + 햄버거 -->
        <div class="header-right">

          <!-- 프로필 드롭다운 -->
          <div class="profile-wrap">
            <button
              id="profile-btn"
              class="profile-btn"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <img id="profile-avatar" src="" alt="프로필 사진" hidden>
              <span id="profile-name" class="profile-name"></span>
              <span class="chevron" aria-hidden="true">▾</span>
            </button>

            <div id="profile-dropdown" class="profile-dropdown" role="menu">
              <button id="btn-logout" class="dropdown-item" role="menuitem" type="button">
                로그아웃
              </button>
            </div>
          </div>

          <!-- 햄버거 (모바일) -->
          <button
            id="hamburger"
            class="hamburger"
            type="button"
            aria-label="메뉴 열기"
            aria-expanded="false"
            aria-controls="nav-menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

        </div>
      </div>
    </header>

    <!-- ── 컨텐츠 ─────────────────────────────────────────── -->
    <main>

      <!-- 히어로 -->
      <section class="hero">
        <div class="container hero-inner">

          <div class="hero-text">
            <span class="badge">AI 기반 낙상 위험 분석</span>
            <h2 class="hero-title">
              데이터로 지키는<br>
              <span class="grad-text">어르신의 걸음</span>
            </h2>
            <p class="hero-desc">
              체계적인 위험도 평가부터 맞춤형 프로그램까지.<br>
              현장 전문가를 위한 스마트 낙상예방 솔루션입니다.
            </p>
            <div class="hero-actions">
              <a href="./assessment.html" class="btn-primary">평가 시작하기</a>
              <a href="./dashboard.html"  class="btn-secondary">대시보드 보기</a>
            </div>
          </div>

          <div class="hero-visual" aria-hidden="true">
            <div class="video-placeholder">
              <div class="play-btn">▶</div>
              <p>앱 소개 영상</p>
            </div>
          </div>

        </div>
      </section>

      <!-- 슬라이드 뷰어 (placeholder) -->
      <section class="section-placeholder" aria-label="기능 소개">
        <div class="container">
          <div class="placeholder-card">
            <p class="placeholder-label">슬라이드 뷰어 섹션</p>
            <p class="placeholder-desc">주요 기능 소개 — 준비 중</p>
          </div>
        </div>
      </section>

      <!-- 통계 (placeholder) -->
      <section class="section-placeholder" aria-label="통계">
        <div class="container">
          <div class="placeholder-card">
            <p class="placeholder-label">통계 섹션</p>
            <p class="placeholder-desc">사용 현황 및 성과 지표 — 준비 중</p>
          </div>
        </div>
      </section>

    </main>
  </div><!-- /#main-view -->

  <script type="module" src="./js/main.js"></script>
</body>
</html>
