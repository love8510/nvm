<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>낙상예방 앱 다운로드</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(160deg,#1b7f4f 0%,#0d4a2e 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
  background:#fff;border-radius:24px;padding:36px 28px;
  width:100%;max-width:380px;text-align:center;
  box-shadow:0 16px 48px rgba(0,0,0,.25);
}
.logo{font-size:48px;margin-bottom:12px;}
h1{font-size:20px;font-weight:800;color:#111827;margin-bottom:6px;}
.sub{font-size:13px;color:#6b7280;margin-bottom:28px;line-height:1.5;}
.qr-wrap{
  background:#f9fafb;border-radius:16px;padding:20px;margin-bottom:24px;
  border:2px dashed #d1fae5;
}
.qr-wrap img{width:200px;height:200px;border-radius:8px;}
.qr-label{font-size:12px;color:#6b7280;margin-top:10px;}
.btn-download{
  display:block;width:100%;padding:16px;
  background:#1b7f4f;color:#fff;
  border:none;border-radius:14px;
  font-size:17px;font-weight:800;cursor:pointer;
  text-decoration:none;
  transition:transform .1s,background .15s;
  margin-bottom:12px;
}
.btn-download:active{transform:scale(.97);}
.btn-download:hover{background:#166340;}
.info{
  font-size:12px;color:#9ca3af;line-height:1.6;
  padding-top:16px;border-top:1px solid #f3f4f6;
}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#d1fae5;color:#065f46;
  font-size:12px;font-weight:700;
  padding:5px 12px;border-radius:99px;margin-bottom:20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌿</div>
  <h1>낙상예방 위험도 추적 시스템</h1>
  <div class="sub">Android 앱 설치 파일</div>

  <div class="badge">✅ 최신 버전</div>

  <div class="qr-wrap">
    <img src="qr-apk.png" alt="APK 다운로드 QR"/>
    <div class="qr-label">카메라로 스캔하면 바로 다운로드</div>
  </div>

  <a class="btn-download" href="낙상예방.apk" download="낙상예방.apk">
    📥 APK 직접 다운로드
  </a>

  <div class="info">
    Android 전용 · 설치 전 [출처를 알 수 없는 앱 허용] 설정 필요<br>
    설정 → 보안 → 알 수 없는 소스 허용
  </div>
</div>
</body>
</html>
